services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    # Optional: pin to a CU tag instead of latest for stability
    # image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04

    container_name: sqlserver_bi_learning
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      # Optional:
      # MSSQL_AGENT_ENABLED: "true"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./sql-scripts:/scripts:ro
      - ./backups:/var/opt/mssql/backup
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S",
          "localhost",
          "-U",
          "sa",
          "-P",
          "${MSSQL_SA_PASSWORD}",
          "-No",
          "-Q",
          "SELECT 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  sqlserver_data:
